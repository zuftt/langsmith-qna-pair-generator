<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 760" font-family="'Comic Sans MS', 'Segoe Print', 'Bradley Hand', cursive">
  <defs>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#495057"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1600" height="760" fill="#ffffff"/>

  <!-- Title -->
  <text x="800" y="55" text-anchor="middle" font-size="34" font-weight="700" fill="#1e1e1e">Three-Stage AI System Architecture</text>
  <text x="800" y="88" text-anchor="middle" font-size="17" fill="#868e96" font-family="'Segoe UI', system-ui, sans-serif">QnA Pair Generator  •  Bahasa Melayu</text>

  <!-- ========== STAGE 1: PRE-FILTER (BLUE) ========== -->
  <rect x="50" y="140" width="440" height="580" rx="14" fill="#e7f5ff" stroke="#1971c2" stroke-width="3"/>
  <path d="M 50 154 Q 50 140 64 140 L 476 140 Q 490 140 490 154 L 490 230 L 50 230 Z" fill="#1971c2"/>
  <text x="75" y="173" font-size="15" font-weight="700" fill="#ffffff" font-family="'Segoe UI', system-ui, sans-serif" letter-spacing="2">STAGE 1</text>
  <text x="75" y="210" font-size="32" font-weight="700" fill="#ffffff">Pre-filter</text>

  <text x="75" y="275" font-size="13" font-weight="700" fill="#1971c2" font-family="'Segoe UI', system-ui, sans-serif" letter-spacing="2">PURPOSE</text>
  <text x="75" y="302" font-size="16" fill="#1e1e1e">Filters out chunks containing</text>
  <text x="75" y="324" font-size="16" fill="#1e1e1e">metadata or inappropriate</text>
  <text x="75" y="346" font-size="16" fill="#1e1e1e">content before processing.</text>

  <text x="75" y="410" font-size="13" font-weight="700" fill="#1971c2" font-family="'Segoe UI', system-ui, sans-serif" letter-spacing="2">CHECKS FOR</text>
  <text x="75" y="437" font-size="16" fill="#1e1e1e">•  File metadata</text>
  <text x="75" y="461" font-size="16" fill="#1e1e1e">•  System information</text>
  <text x="75" y="485" font-size="16" fill="#1e1e1e">•  Non-Malay content</text>
  <text x="75" y="509" font-size="16" fill="#1e1e1e">•  Text length</text>

  <text x="75" y="595" font-size="13" font-weight="700" fill="#1971c2" font-family="'Segoe UI', system-ui, sans-serif" letter-spacing="2">OUTPUT</text>
  <text x="75" y="622" font-size="16" fill="#1e1e1e">Accepts or rejects text</text>
  <text x="75" y="644" font-size="16" fill="#1e1e1e">chunks before processing.</text>

  <!-- Arrow 1 -> 2 -->
  <line x1="500" y1="430" x2="570" y2="430" stroke="#495057" stroke-width="4" marker-end="url(#arrowhead)"/>

  <!-- ========== STAGE 2: GENERATOR (GREEN) ========== -->
  <rect x="580" y="140" width="440" height="580" rx="14" fill="#ebfbee" stroke="#2f9e44" stroke-width="3"/>
  <path d="M 580 154 Q 580 140 594 140 L 1006 140 Q 1020 140 1020 154 L 1020 230 L 580 230 Z" fill="#2f9e44"/>
  <text x="605" y="173" font-size="15" font-weight="700" fill="#ffffff" font-family="'Segoe UI', system-ui, sans-serif" letter-spacing="2">STAGE 2</text>
  <text x="605" y="210" font-size="32" font-weight="700" fill="#ffffff">Generator</text>

  <text x="605" y="275" font-size="13" font-weight="700" fill="#2f9e44" font-family="'Segoe UI', system-ui, sans-serif" letter-spacing="2">PURPOSE</text>
  <text x="605" y="302" font-size="16" fill="#1e1e1e">Generates Q&amp;A pair candidates</text>
  <text x="605" y="324" font-size="16" fill="#1e1e1e">from validated text chunks.</text>

  <text x="605" y="410" font-size="13" font-weight="700" fill="#2f9e44" font-family="'Segoe UI', system-ui, sans-serif" letter-spacing="2">CAPABILITIES</text>
  <text x="605" y="437" font-size="16" fill="#1e1e1e">•  Up to 10 pairs per chunk</text>
  <text x="605" y="461" font-size="16" fill="#1e1e1e">•  Various difficulty levels</text>
  <text x="605" y="485" font-size="16" fill="#1e1e1e">•  Strict JSONL output</text>
  <text x="605" y="509" font-size="16" fill="#1e1e1e">•  Bahasa Melayu baku</text>

  <text x="605" y="595" font-size="13" font-weight="700" fill="#2f9e44" font-family="'Segoe UI', system-ui, sans-serif" letter-spacing="2">FORMAT</text>
  <text x="605" y="622" font-size="16" fill="#1e1e1e" font-family="'Courier New', monospace">{ question, answer, source }</text>
  <text x="605" y="644" font-size="16" fill="#1e1e1e">per pair.</text>

  <!-- Arrow 2 -> 3 -->
  <line x1="1030" y1="430" x2="1100" y2="430" stroke="#495057" stroke-width="4" marker-end="url(#arrowhead)"/>

  <!-- ========== STAGE 3: REVIEWER (ORANGE) ========== -->
  <rect x="1110" y="140" width="440" height="580" rx="14" fill="#fff4e6" stroke="#e8590c" stroke-width="3"/>
  <path d="M 1110 154 Q 1110 140 1124 140 L 1536 140 Q 1550 140 1550 154 L 1550 230 L 1110 230 Z" fill="#e8590c"/>
  <text x="1135" y="173" font-size="15" font-weight="700" fill="#ffffff" font-family="'Segoe UI', system-ui, sans-serif" letter-spacing="2">STAGE 3</text>
  <text x="1135" y="210" font-size="32" font-weight="700" fill="#ffffff">Reviewer</text>

  <text x="1135" y="275" font-size="13" font-weight="700" fill="#e8590c" font-family="'Segoe UI', system-ui, sans-serif" letter-spacing="2">PURPOSE</text>
  <text x="1135" y="302" font-size="16" fill="#1e1e1e">Verifies and filters generated</text>
  <text x="1135" y="324" font-size="16" fill="#1e1e1e">Q&amp;A pairs for quality and</text>
  <text x="1135" y="346" font-size="16" fill="#1e1e1e">accuracy.</text>

  <text x="1135" y="410" font-size="13" font-weight="700" fill="#e8590c" font-family="'Segoe UI', system-ui, sans-serif" letter-spacing="2">FILTERS OUT</text>
  <text x="1135" y="437" font-size="16" fill="#1e1e1e">•  Author names &amp; journals</text>
  <text x="1135" y="461" font-size="16" fill="#1e1e1e">•  Emails &amp; references</text>
  <text x="1135" y="485" font-size="16" fill="#1e1e1e">•  Low-quality pairs</text>
  <text x="1135" y="509" font-size="16" fill="#1e1e1e">•  Metadata leakage</text>

  <text x="1135" y="595" font-size="13" font-weight="700" fill="#e8590c" font-family="'Segoe UI', system-ui, sans-serif" letter-spacing="2">ACTIONS</text>
  <text x="1135" y="622" font-size="16" fill="#1e1e1e">Accept  ·  Edit  ·  Reject</text>
</svg>
