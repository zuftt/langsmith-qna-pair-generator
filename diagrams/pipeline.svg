<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 600" font-family="'Comic Sans MS', 'Segoe Print', 'Bradley Hand', cursive">
  <defs>
    <marker id="arrowhead2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#495057"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1440" height="600" fill="#ffffff"/>

  <!-- Title -->
  <text x="720" y="50" text-anchor="middle" font-size="34" font-weight="700" fill="#1e1e1e">Processing Flow</text>
  <text x="720" y="83" text-anchor="middle" font-size="16" fill="#868e96" font-family="'Segoe UI', system-ui, sans-serif">Input  →  Pre-filter  →  Generator  →  Reviewer  →  CSV</text>

  <!-- ===================== ROW 1 (left to right) ===================== -->

  <!-- Box 1: Input Text (DATA) -->
  <rect x="80" y="150" width="240" height="110" rx="12" fill="#f1f3f5" stroke="#868e96" stroke-width="2"/>
  <text x="98" y="178" font-size="11" font-weight="700" fill="#868e96" font-family="'Segoe UI', system-ui, sans-serif" letter-spacing="2">DATA</text>
  <text x="200" y="210" text-anchor="middle" font-size="22" font-weight="700" fill="#1e1e1e">Input Text</text>
  <text x="200" y="240" text-anchor="middle" font-size="13" fill="#868e96" font-family="'Segoe UI', system-ui, sans-serif">.txt files</text>

  <!-- Arrow 1 -> 2 -->
  <line x1="320" y1="205" x2="400" y2="205" stroke="#495057" stroke-width="3" marker-end="url(#arrowhead2)"/>

  <!-- Box 2: Pre-filter (STAGE 1, blue) -->
  <rect x="400" y="150" width="240" height="110" rx="12" fill="#d0ebff" stroke="#1971c2" stroke-width="2"/>
  <text x="418" y="178" font-size="11" font-weight="700" fill="#1971c2" font-family="'Segoe UI', system-ui, sans-serif" letter-spacing="2">STAGE 1</text>
  <text x="520" y="210" text-anchor="middle" font-size="22" font-weight="700" fill="#1e1e1e">Pre-filter</text>
  <text x="520" y="240" text-anchor="middle" font-size="13" fill="#1971c2" font-family="'Segoe UI', system-ui, sans-serif">validate chunks</text>

  <!-- Arrow 2 -> 3 -->
  <line x1="640" y1="205" x2="720" y2="205" stroke="#495057" stroke-width="3" marker-end="url(#arrowhead2)"/>

  <!-- Box 3: Valid Chunks (DATA) -->
  <rect x="720" y="150" width="240" height="110" rx="12" fill="#f1f3f5" stroke="#868e96" stroke-width="2"/>
  <text x="738" y="178" font-size="11" font-weight="700" fill="#868e96" font-family="'Segoe UI', system-ui, sans-serif" letter-spacing="2">DATA</text>
  <text x="840" y="210" text-anchor="middle" font-size="22" font-weight="700" fill="#1e1e1e">Valid Chunks</text>
  <text x="840" y="240" text-anchor="middle" font-size="13" fill="#868e96" font-family="'Segoe UI', system-ui, sans-serif">clean text passages</text>

  <!-- Arrow 3 -> 4 -->
  <line x1="960" y1="205" x2="1040" y2="205" stroke="#495057" stroke-width="3" marker-end="url(#arrowhead2)"/>

  <!-- Box 4: Generator (STAGE 2, green) -->
  <rect x="1040" y="150" width="240" height="110" rx="12" fill="#d3f9d8" stroke="#2f9e44" stroke-width="2"/>
  <text x="1058" y="178" font-size="11" font-weight="700" fill="#2f9e44" font-family="'Segoe UI', system-ui, sans-serif" letter-spacing="2">STAGE 2</text>
  <text x="1160" y="210" text-anchor="middle" font-size="22" font-weight="700" fill="#1e1e1e">Generator</text>
  <text x="1160" y="240" text-anchor="middle" font-size="13" fill="#2f9e44" font-family="'Segoe UI', system-ui, sans-serif">create Q&amp;A pairs</text>

  <!-- ===================== U-TURN ARROW (right side) ===================== -->
  <path d="M 1280 205 L 1360 205 L 1360 475 L 1290 475" fill="none" stroke="#495057" stroke-width="3" marker-end="url(#arrowhead2)"/>

  <!-- ===================== ROW 2 (right to left) ===================== -->

  <!-- Box 5: Q&A Candidates (DATA) -->
  <rect x="1040" y="420" width="240" height="110" rx="12" fill="#f1f3f5" stroke="#868e96" stroke-width="2"/>
  <text x="1058" y="448" font-size="11" font-weight="700" fill="#868e96" font-family="'Segoe UI', system-ui, sans-serif" letter-spacing="2">DATA</text>
  <text x="1160" y="480" text-anchor="middle" font-size="22" font-weight="700" fill="#1e1e1e">Q&amp;A Candidates</text>
  <text x="1160" y="510" text-anchor="middle" font-size="13" fill="#868e96" font-family="'Segoe UI', system-ui, sans-serif">draft pairs</text>

  <!-- Arrow 5 -> 6 (leftward) -->
  <line x1="1040" y1="475" x2="960" y2="475" stroke="#495057" stroke-width="3" marker-end="url(#arrowhead2)"/>

  <!-- Box 6: Reviewer (STAGE 3, orange) -->
  <rect x="720" y="420" width="240" height="110" rx="12" fill="#ffe8cc" stroke="#e8590c" stroke-width="2"/>
  <text x="738" y="448" font-size="11" font-weight="700" fill="#e8590c" font-family="'Segoe UI', system-ui, sans-serif" letter-spacing="2">STAGE 3</text>
  <text x="840" y="480" text-anchor="middle" font-size="22" font-weight="700" fill="#1e1e1e">Reviewer</text>
  <text x="840" y="510" text-anchor="middle" font-size="13" fill="#e8590c" font-family="'Segoe UI', system-ui, sans-serif">verify quality</text>

  <!-- Arrow 6 -> 7 (leftward) -->
  <line x1="720" y1="475" x2="640" y2="475" stroke="#495057" stroke-width="3" marker-end="url(#arrowhead2)"/>

  <!-- Box 7: Final Q&A Pairs (DATA) -->
  <rect x="400" y="420" width="240" height="110" rx="12" fill="#f1f3f5" stroke="#868e96" stroke-width="2"/>
  <text x="418" y="448" font-size="11" font-weight="700" fill="#868e96" font-family="'Segoe UI', system-ui, sans-serif" letter-spacing="2">DATA</text>
  <text x="520" y="480" text-anchor="middle" font-size="22" font-weight="700" fill="#1e1e1e">Final Q&amp;A Pairs</text>
  <text x="520" y="510" text-anchor="middle" font-size="13" fill="#868e96" font-family="'Segoe UI', system-ui, sans-serif">reviewed pairs</text>

  <!-- Arrow 7 -> 8 (leftward) -->
  <line x1="400" y1="475" x2="320" y2="475" stroke="#495057" stroke-width="3" marker-end="url(#arrowhead2)"/>

  <!-- Box 8: CSV Output (OUTPUT, purple) -->
  <rect x="80" y="420" width="240" height="110" rx="12" fill="#f3d9fa" stroke="#9c36b5" stroke-width="2"/>
  <text x="98" y="448" font-size="11" font-weight="700" fill="#9c36b5" font-family="'Segoe UI', system-ui, sans-serif" letter-spacing="2">OUTPUT</text>
  <text x="200" y="480" text-anchor="middle" font-size="22" font-weight="700" fill="#1e1e1e">CSV Output</text>
  <text x="200" y="510" text-anchor="middle" font-size="13" fill="#9c36b5" font-family="'Segoe UI', system-ui, sans-serif">download file</text>
</svg>
